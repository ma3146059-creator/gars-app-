<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة غرس | Gars</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a2b16;
            --gold: #c5a059;
            --bg: #050a07;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #0a2b16 0%, transparent 40%);
            color: var(--text); overflow-x: hidden; min-height: 100vh;
        }

        /* شاشة الدخول */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .login-logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 2px solid var(--gold); margin-bottom: 20px; overflow: hidden;
        }

        input {
            width: 100%; max-width: 300px; padding: 15px; margin-bottom: 10px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--card-bg); color: white; text-align: center; outline: none;
        }

        .btn-enter {
            width: 100%; max-width: 300px; padding: 15px; border-radius: 12px;
            border: none; background: var(--gold); color: white; font-weight: 700; cursor: pointer;
        }

        /* الهيدر */
        header { padding: 30px 20px 10px; text-align: center; }
        .user-welcome { font-size: 20px; color: var(--gold); font-weight: 700; }

        /* الأقسام */
        .page { display: none; padding: 0 20px 100px; animation: fadeIn 0.4s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-title { font-size: 20px; margin: 25px 0 15px; border-right: 3px solid var(--gold); padding-right: 10px; }

        /* كروت الخدمات الأربعة */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .service-card {
            background: var(--card-bg); border-radius: 18px; padding: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .service-card i { font-size: 32px; margin-bottom: 10px; display: block; }
        .service-card h3 { font-size: 14px; margin: 0; line-height: 1.4; }

        /* الشريط السفلي - 5 أيقونات */
        .nav-bar {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px);
            border-radius: 20px; display: flex; justify-content: space-around;
            padding: 10px 5px; border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .nav-item { color: #777; display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* لوحة التحكم */
        .admin-row { background: var(--card-bg); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; font-size: 13px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-logo"><img src="https://i.ibb.co/XfXkXyG/logo.jpg" style="width:100%; height:100%;" alt=""></div>
        <h2 style="color: var(--gold); margin-bottom: 30px;">مؤسسة غرس</h2>
        <input type="text" id="u-name" placeholder="الاسم الكامل">
        <input type="tel" id="u-phone" placeholder="رقم الجوال">
        <button class="btn-enter" onclick="launchApp()">دخول</button>
    </div>

    <header><div class="user-welcome" id="display-name">مرحباً بك</div></header>

    <div id="p-services" class="page active-page">
        <div class="section-title">خدماتنا</div>
        <div class="services-grid">
            <div class="service-card"><i>🌿</i><h3>تنسيق حدائق</h3></div>
            <div class="service-card"><i>💧</i><h3>تركيب شبكات الري</h3></div>
            <div class="service-card"><i>🛠️</i><h3>صيانة دورية</h3></div>
            <div class="service-card"><i>🌻</i><h3>زراعة النباتات</h3></div>
        </div>
    </div>

    <div id="p-shop" class="page"><div class="section-title">المتجر</div><p style="text-align:center; opacity:0.5;">قريباً..</p></div>

    <div id="p-profile" class="page"><div class="section-title">بياناتي</div><p id="profile-info" style="text-align:center;"></p></div>

    <div id="p-pay" class="page">
        <div class="section-title">الدفع البنكي</div>
        <div style="background:linear-gradient(135deg, #111, #000); padding:25px; border-radius:20px; border:1px solid var(--gold); text-align:center;">
            <p>مصرف الراجحي</p>
            <h3 style="letter-spacing:1px; margin:15px 0;">SA56 8000 0204 6080 1612 0119</h3>
            <button class="btn-enter" onclick="copyIban()">نسخ الآيبان</button>
        </div>
    </div>

    <div id="p-admin" class="page">
        <div class="section-title">لوحة المدير</div>
        <div id="admin-results"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="navTo('p-services', this)"><i>🌿</i>الخدمات</div>
        <div class="nav-item" onclick="navTo('p-shop', this)"><i>🛒</i>المتجر</div>
        <div class="nav-item" onclick="navTo('p-profile', this)"><i>👤</i>بياناتي</div>
        <div class="nav-item" onclick="navTo('p-pay', this)"><i>💳</i>الدفع</div>
        <div id="nav-admin" class="nav-item hidden" onclick="checkAdminAccess()"><i>⚙️</i>التحكم</div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://gars-app-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const MASTER_PASS = "Mostafa346355";
        const MASTER_PHONE = "0561320444";
        let userPhone = "";
        let userName = "";

        function launchApp() {
            userName = document.getElementById('u-name').value;
            userPhone = document.getElementById('u-phone').value;
            if(userName && userPhone) {
                database.ref('visitors').push({ name: userName, phone: userPhone, time: new Date().toLocaleString('ar-SA') });
                document.getElementById('display-name').innerText = "يا هلا، " + userName;
                document.getElementById('profile-info').innerText = "الاسم: " + userName + "\n الجوال: " + userPhone;
                document.getElementById('login-screen').classList.add('hidden');
                if(userPhone === MASTER_PHONE) document.getElementById('nav-admin').classList.remove('hidden');
            } else { alert("تأكد من إدخال البيانات"); }
        }

        function navTo(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            el.classList.add('active');
        }

        function checkAdminAccess() {
            if(userPhone !== MASTER_PHONE) return;
            const p = prompt("الرمز السري:");
            if(p === MASTER_PASS) {
                navTo('p-admin', document.getElementById('nav-admin'));
                fetchData();
            }
        }

        function fetchData() {
            database.ref('visitors').on('value', (snap) => {
                const res = document.getElementById('admin-results');
                res.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    res.innerHTML += `<div class="admin-row"><span>${d.name}</span><span style="color:var(--gold)">${d.phone}</span></div>`;
                });
            });
        }

        function copyIban() {
            navigator.clipboard.writeText("SA56 8000 0204 6080 1612 0119");
            alert("تم النسخ");
        }
    </script>
</body>
</html>
