<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة غرس لتنسيق الحدائق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #052c15; /* الأخضر الملكي من الصورة */
            --gold: #c5a059; /* الذهبي من الصورة */
            --card-bg: #1a1a1a; /* لون بطاقة الدخول */
            --btn-brown: #3d1c0c; /* لون زر المتابعة */
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-green);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* تنسيق الشعار العلوي */
        .header {
            padding-top: 50px;
            text-align: center;
            width: 100%;
        }

        .logo-circle {
            width: 130px;
            height: 130px;
            background-color: white;
            border: 3px solid var(--gold);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        /* صورة الشعار (النخلة والإكليل) */
        .logo-circle img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .title {
            color: var(--gold);
            font-size: 24px;
            margin: 15px 0 5px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        /* بطاقة تسجيل الدخول */
        .login-card {
            background-color: var(--card-bg);
            width: 85%;
            max-width: 350px;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-family: 'Tajawal';
            outline: none;
            text-align: right;
        }

        .input-group i {
            color: var(--gold);
            font-size: 18px;
        }

        /* زر المتابعة */
        .btn-submit {
            background-color: var(--btn-brown);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-circle">
            <img src="logo.png" alt="شعار مؤسسة غرس">
        </div>
        <div class="title">غرس لتنسيق الحدائق</div>
        <div class="subtitle">تنسيق الحدائق وتركيب شبكات الري</div>
    </div>

    <div class="login-card">
        <h2>تسجيل الدخول</h2>
        
        <div class="input-group">
            <span>👤</span>
            <input type="text" placeholder="أدخل اسمك الكامل">
        </div>

        <div class="input-group">
            <span>📞</span>
            <input type="tel" placeholder="أدخل رقم جوالك">
        </div>

        <button class="btn-submit">
            متابعة 
            <span style="font-size: 20px;">←</span>
        </button>
    </div>

</body>
</html>
