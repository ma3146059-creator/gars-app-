<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gars Foundation | مؤسسة غرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a2b16; --gold: #c5a059; --bg: #05160b; --card: #1a1a1a; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: white; overflow-x: hidden; }
        
        #login { position: fixed; inset: 0; background: var(--primary); z-index: 3000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--gold); }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #222; color: white; outline: none; text-align: center; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, var(--primary), var(--bg)); }
        .logo-circle { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; font-weight: bold; color: var(--gold); }

        .section { padding: 20px; display: none; margin-bottom: 80px; }
        .active-section { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #888; text-align: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { font-size: 22px; display: block; margin-bottom: 3px; }

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; border-radius: 10px; overflow: hidden; }
        .admin-table th, .admin-table td { border: 1px solid #222; padding: 12px 8px; text-align: center; font-size: 13px; }
        .admin-table th { background: var(--primary); color: var(--gold); }

        .iban-card { background: linear-gradient(135deg, #1a472a, #0d2616); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 20px; position: relative; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-card">
            <div class="logo-circle">GARS</div>
            <h2 style="color: var(--gold)">مؤسسة غرس</h2>
            <p>لتنسيق الحدائق والشلالات</p>
            <input type="text" id="u-name" placeholder="الاسم الكريم">
            <input type="tel" id="u-phone" placeholder="رقم الجوال">
            <button class="btn-main" onclick="startApp()">دخول مباشر</button>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
            <div class="logo-circle">GARS</div>
            <h3 id="welcome-msg" style="margin: 0; color: var(--gold);">مرحباً بك</h3>
        </div>

        <div id="services" class="section active-section">
            <h2 style="text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">خدماتنا الفنية</h2>
            <div style="background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center;">🌿 تنسيق وتصميم الحدائق</div>
            <div style="background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center;">💧 تركيب أنظمة الري الحديثة</div>
            <div style="background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center;">🏗️ بناء المظلات والشلالات</div>
        </div>

        <div id="payment" class="section">
            <h2 style="text-align: center; color: var(--gold);">بيانات التحويل</h2>
            <div class="iban-card">
                <p style="margin: 0; font-size: 14px; opacity: 0.8;">مصرف الراجحي</p>
                <h3 style="margin: 15px 0; letter-spacing: 1px; font-size: 16px;">SA56 8000 0204 6080 1612 0119</h3>
                <button class="btn-main" onclick="copyIban()">نسخ رقم الآيبان</button>
            </div>
        </div>

        <div id="admin" class="section">
            <h2 style="color: var(--gold); text-align: center;">لوحة إدارة الطلبات</h2>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr><th>الاسم</th><th>الجوال</th><th>التاريخ</th></tr>
                    </thead>
                    <tbody id="data-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showTab('services', this)"><span>🌿</span>الرئيسية</div>
        <div class="nav-item" onclick="showTab('payment', this)"><span>💳</span>الدفع</div>
        <div id="admin-nav" class="nav-item hidden" onclick="checkAdmin()"><span>⚙️</span>التحكم</div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://gars-app-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ADMIN_PASSWORD = "Mostafa346355"; 
        const ADMIN_PHONE = "0561320444"; // الرقم المسموح له بالدخول
        let currentUserPhone = "";

        function startApp() {
            const name = document.getElementById('u-name').value;
            const phone = document.getElementById('u-phone').value;
            if(name && phone) {
                currentUserPhone = phone;
                // إرسال البيانات لفايربيز كزائر
                database.ref('visitors').push({ name, phone, date: new Date().toLocaleString('ar-SA') });
                
                document.getElementById('welcome-msg').innerText = "يا هلا، " + name;
                document.getElementById('login').classList.add('hidden');

                // فحص إذا كان الداخل هو المدير لإظهار أيقونة التحكم
                if(phone === ADMIN_PHONE) {
                    document.getElementById('admin-nav').classList.remove('hidden');
                }
            } else { alert("يرجى إدخال الاسم ورقم الجوال"); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-section');
            el.classList.add('active');
        }

        function checkAdmin() {
            // أمان إضافي: التحقق من الرقم المسجل قبل طلب الباسورد
            if(currentUserPhone !== ADMIN_PHONE) {
                alert("عذراً، هذه الخاصية للمدير فقط.");
                return;
            }

            const pass = prompt("فضلاً أدخل الرقم السري للمدير:");
            if(pass === ADMIN_PASSWORD) {
                showTab('admin', document.getElementById('admin-nav'));
                loadData();
            } else if (pass !== null) { alert("الرقم السري غير صحيح!"); }
        }

        function loadData() {
            database.ref('visitors').on('value', (snapshot) => {
                const list = document.getElementById('data-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const val = child.val();
                    list.innerHTML += `<tr><td>${val.name}</td><td>${val.phone}</td><td>${val.date}</td></tr>`;
                });
            });
        }

        function copyIban() {
            navigator.clipboard.writeText("SA56 8000 0204 6080 1612 0119");
            alert("تم نسخ الآيبان.. شكراً لثقتكم");
        }
    </script>
</body>
</html>
